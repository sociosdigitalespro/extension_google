<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapEdit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      background: #0f0f13;
      font-family: 'Inter', sans-serif;
      color: #e2e8f0;
      overflow: hidden;
    }

    .popup-container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-text h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text p {
      font-size: 11px;
      color: #64748b;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #1e293b, transparent);
    }

    .capture-btn {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .capture-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .capture-btn:hover::before {
      opacity: 1;
    }

    .capture-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    .capture-btn:active {
      transform: translateY(0);
    }

    .capture-btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .capture-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .features-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #1a1a24;
      border-radius: 8px;
      border: 1px solid #1e293b;
    }

    .feature-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .feature-icon.crop {
      background: rgba(34, 197, 94, 0.15);
    }

    .feature-icon.erase {
      background: rgba(251, 146, 60, 0.15);
    }

    .feature-icon.tools {
      background: rgba(99, 102, 241, 0.15);
    }

    .feature-text {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.4;
    }

    .feature-text strong {
      color: #e2e8f0;
      font-weight: 500;
    }

    .error-msg {
      padding: 10px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      font-size: 12px;
      color: #fca5a5;
      display: none;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="logo-section">
      <div class="logo-icon">📸</div>
      <div class="logo-text">
        <h1>SnapEdit</h1>
        <p>Captura y edita tu pantalla</p>
      </div>
    </div>

    <div class="divider"></div>

    <button class="capture-btn" id="captureBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Capturar pantalla
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="features-list">
      <div class="feature-item">
        <div class="feature-icon crop">✂️</div>
        <div class="feature-text"><strong>Recorte</strong> — selección rectangular</div>
      </div>
      <div class="feature-item">
        <div class="feature-icon erase">🪄</div>
        <div class="feature-text"><strong>Borrado</strong> — rellena con color adyacente</div>
      </div>
      <div class="feature-item">
        <div class="feature-icon tools">↩️</div>
        <div class="feature-text"><strong>Deshacer</strong> y <strong>guardar</strong> incluidos</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
